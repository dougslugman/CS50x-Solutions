{% extends "layout.html" %}

{% block title %}
    Index
{% endblock %}

{% block main %}
<h3>History</h3>
<br>
<table class = "table table-bordered table-striped">
    <thead class = "thead-light">
        <tr>
            <th>Symbol</th>
            <th>Shares</th>
            <th>Price</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody>
        {% for transaction in transactions %}
        <tr>
            <td>{{transaction["symbol"]}}</td>
            <td>{{transaction["shares"]}}</td>
            <td>{{transaction["price"]|usd }}</td>
            <td>{{transaction["date"]}}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
