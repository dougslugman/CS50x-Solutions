{% extends "layout.html" %}

{% block title %}
    Quote
{% endblock %}

{% block main %}

<h3>Find a Stock Quote</h3>
<br>
    <form action="/quote" method="post">

        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="symbol" placeholder="Symbol" type="text">
        </div>

        <button class="btn btn-primary" type="submit">Quote</button>
    </form>
    {% if quote %}
        <br>
        <hr>
        <br>
        <h5>{{quote['name']}}, {{quote['symbol']}}</h5>
        <p>Has a price of {{quote['price']|usd}}</p>
    {% endif %}

{% endblock %}
